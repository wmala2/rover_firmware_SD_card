[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

build_flags =
  -D ARDUINO_ARCH_ESP32
  -D WS_ENABLE_LOG=0
  -D WS_SERIAL_MIRROR=0

  ; --- Rover static IP / gateway override (uncomment + edit to change) ---
  ; Comma values are fine here; keep -D attached to the name, no space.
  -DROVER_IP=192,168,50,213
  ; -DROVER_GW=192,168,50,1
  ; -DUSE_STATIC_IP=false        ; or switch the rover to DHCP entirely
  ; Override examples:
  ; -D WIFI_SSID=\"YourSSID\"
  ; -D WIFI_PASS=\"YourPass\"
  ; -D DEFAULT_CMD_RATE_HZ=10
  ; -D PID_RATE=10 -D PID_INTERVAL=100

lib_deps =
    bblanchon/ArduinoJson @ ^7
    adafruit/Adafruit_VL53L0X@^1.2.4
